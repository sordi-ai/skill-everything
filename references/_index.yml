# Single source of truth for sub-skill index.
# tools/render_loaders.py reads this and regenerates SKILL.md, CLAUDE.md, GEMINI.md, .cursorrules.
# CI fails if the regenerated files differ from what's in git (drift detection).

meta:
  name: skill-everything
  version: 1.0.0
  description: Git-versioned agent memory — agents that never make the same mistake twice.

skills:
  - id: code-quality
    title: Code Quality
    path: references/development/code-quality.md
    triggers:
      - writing code
      - refactoring
      - review
    loaders:
      claude:  '@references/development/code-quality.md'
      gemini:  '@references/development/code-quality.md'
      cursor:  '@file:./references/development/code-quality.md'
      skill_resource: 'skill_resource(skill_name="skill-everything", relative_path="references/development/code-quality.md")'

  - id: python
    title: Python
