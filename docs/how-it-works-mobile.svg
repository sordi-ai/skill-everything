<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-labelledby="title desc" font-family="-apple-system, system-ui, 'Segoe UI', Roboto, sans-serif">
  <title id="title">How skill-everything self-extends — mobile pipeline</title>
  <desc id="desc">A vertically stacked six-step pipeline showing how an agent error becomes a merged rule via PR-flow with two CI gates and human approval. Mobile-optimised with no callouts.</desc>

  <style>
    :root {
      --bg:        #fbfbfa;
      --ink:       #1a1d21;
      --muted:     #5a6470;
      --hairline:  #cfd5dc;
      --rule:      #8b95a0;
      --agent:     #3a5a7a;
      --agent-fill:#eaf0f5;
      --ci:        #1f7a4a;
      --ci-fill:   #e6f3ec;
      --human:     #b46a00;
      --human-fill:#fbeed1;
      --git:       #2b2f33;
      --loop:      #7c3aed;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:        #11141a;
        --ink:       #e6e9ee;
        --muted:     #8a93a0;
        --hairline:  #3a424d;
        --rule:      #5a6470;
        --agent:     #88aed3;
        --agent-fill:#1a2330;
        --ci:        #6fc093;
        --ci-fill:   #14241c;
        --human:     #e3a154;
        --human-fill:#2a2014;
        --git:       #c8cdd4;
        --loop:      #b794ff;
      }
    }

    .frame      { fill: var(--bg); stroke: var(--hairline); }
    .lane       { fill: var(--bg); stroke: var(--hairline); stroke-dasharray: 2 3; }
    .lane-label { font: 700 11px ui-monospace, 'SF Mono', Menlo, Consolas, monospace; letter-spacing: 0.8px; fill: var(--muted); }

    .h-title    { font: 700 14px -apple-system, system-ui, sans-serif; letter-spacing: 2px; fill: var(--ink); }
    .h-sub      { font: 400 12px -apple-system, system-ui, sans-serif; fill: var(--muted); }

    .node       { fill: var(--agent-fill); stroke: var(--agent); stroke-width: 1.5; }
    .node.ci    { fill: var(--ci-fill);    stroke: var(--ci); }
    .node.human { fill: var(--human-fill); stroke: var(--human); }

    .step-num   { font: 700 11px ui-monospace, Consolas, monospace; fill: var(--muted); letter-spacing: 0.5px; }
    .node-title { font: 600 14px -apple-system, system-ui, sans-serif; fill: var(--ink); }
    .node-sub   { font: 400 12px -apple-system, system-ui, sans-serif; fill: var(--muted); }
    .mono-tag   { font: 500 12px ui-monospace, Consolas, monospace; fill: var(--ink); }

    .arrow      { stroke: var(--rule); stroke-width: 1.5; fill: none; }
    .arrow.loop { stroke: var(--loop); stroke-width: 2; stroke-dasharray: 5 4; }

    .gate-label { font: 700 11px ui-monospace, Consolas, monospace; fill: var(--ci); letter-spacing: 0.5px; }

    .loop-label { font: 600 12px ui-monospace, Consolas, monospace; fill: var(--loop); }
    .tagline    { font: 600 12px -apple-system, system-ui, sans-serif; fill: var(--ink); }
  </style>

  <defs>
    <marker id="a-rule" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="9" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,4 L0,8 z" fill="var(--rule)"/>
    </marker>
    <marker id="a-loop" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="9" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,4 L0,8 z" fill="var(--loop)"/>
    </marker>
    <marker id="a-ci" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="9" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,4 L0,8 z" fill="var(--ci)"/>
    </marker>
  </defs>

  <rect class="frame" x="0.5" y="0.5" width="799" height="599" rx="6"/>

  <!-- HEADER -->
  <text class="h-title" x="24" y="32">SELF-EXTENSION PIPELINE</text>
  <text class="h-sub"   x="24" y="52">Every commit means the next session inherits the fix.</text>

  <!-- Lane labels (left rail) -->
  <text class="lane-label" x="24"  y="86">AGENT</text>
  <text class="lane-label" x="24"  y="358">CI / CHECKS</text>
  <text class="lane-label" x="24"  y="438">HUMAN</text>

  <!-- ===== Stack of steps ===== -->
  <!-- Step 1 -->
  <g transform="translate(220 90)">
    <rect class="node" x="0" y="0" width="360" height="56" rx="6"/>
    <text class="step-num" x="12" y="18">STEP&#8201;1</text>
    <text class="node-title" x="12" y="36">Trigger</text>
    <text class="node-sub"   x="12" y="50">test fails · user correction · realisation</text>
  </g>
  <line x1="400" y1="148" x2="400" y2="170" class="arrow" marker-end="url(#a-rule)"/>

  <!-- Step 2 -->
  <g transform="translate(220 174)">
    <rect class="node" x="0" y="0" width="360" height="56" rx="6"/>
    <text class="step-num" x="12" y="18">STEP&#8201;2</text>
    <text class="node-title" x="12" y="36">Search before write</text>
    <text class="mono-tag"   x="12" y="50">grep ERR- error-log.md</text>
  </g>
  <line x1="400" y1="232" x2="400" y2="254" class="arrow" marker-end="url(#a-rule)"/>

  <!-- Step 3 + 4 (combined for vertical compactness) -->
  <g transform="translate(220 258)">
    <rect class="node" x="0" y="0" width="360" height="56" rx="6"/>
    <text class="step-num" x="12" y="18">STEP&#8201;3 – 4</text>
    <text class="node-title" x="12" y="36">Analyse · formulate new_rule</text>
    <text class="node-sub"   x="12" y="50">verb &#8712; {Always, Never, Before, …}</text>
  </g>
  <line x1="400" y1="316" x2="400" y2="338" class="arrow" marker-end="url(#a-rule)"/>

  <!-- Step 5 -->
  <g transform="translate(220 342)">
    <rect class="node" x="0" y="0" width="360" height="56" rx="6"/>
    <text class="step-num" x="12" y="18">STEP&#8201;5</text>
    <text class="node-title" x="12" y="36">Open PR</text>
    <text class="mono-tag"   x="12" y="50">learn/ERR-2026-014  ·  needs-rule-review</text>
  </g>
  <line x1="400" y1="400" x2="400" y2="422" class="arrow" marker-end="url(#a-ci)" stroke="var(--ci)"/>

  <!-- CI gates (combined into one band for mobile) -->
  <g transform="translate(220 426)">
    <rect class="node ci" x="0" y="0" width="360" height="56" rx="6"/>
    <text class="gate-label" x="12" y="18">CI GATE  ·  lint-rules + auto-approve</text>
    <text class="node-sub"   x="12" y="36">schemas/error-entry.json + verb allow-list</text>
    <text class="node-sub"   x="12" y="50">scope: references/errors/**</text>
  </g>
  <line x1="400" y1="484" x2="400" y2="506" class="arrow" marker-end="url(#a-rule)"/>

  <!-- Step 6 (human) -->
  <g transform="translate(220 510)">
    <rect class="node human" x="0" y="0" width="360" height="56" rx="6"/>
    <text class="step-num" x="12" y="18">STEP&#8201;6</text>
    <text class="node-title" x="12" y="36">Reviewer merges</text>
    <text class="mono-tag"   x="12" y="50">CODEOWNERS · @maintainers</text>
  </g>

  <!-- ============= FEEDBACK LOOP ============= -->
  <!-- Out the right side of Step 6, up the right rail, back into Step 1 -->
  <path d="M 580 538 C 660 538, 700 538, 700 480 C 700 200, 700 118, 620 118"
        class="arrow loop" marker-end="url(#a-loop)" fill="none"/>
  <text class="loop-label" x="710" y="328" transform="rotate(-90 710 328)" text-anchor="middle">
    next session inherits the fix
  </text>

  <!-- TAGLINE -->
  <text class="tagline" x="400" y="586" text-anchor="middle">plain Markdown  ·  Git  ·  human reviewed</text>
</svg>
