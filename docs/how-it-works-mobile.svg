<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 760" role="img" aria-labelledby="title desc" font-family="-apple-system, system-ui, 'Segoe UI', Roboto, sans-serif">
  <title id="title">How skill-everything self-extends — mobile pipeline</title>
  <desc id="desc">A vertically stacked pipeline showing how an agent error becomes a merged rule via three serial CI gates: lint-rules, auto-approve, auto-merge. Mobile-optimised. Human review is detailed in pr-flow.svg.</desc>

  <style>
    :root {
      --bg:        #fbfbfa;
      --ink:       #1a1d21;
      --muted:     #5a6470;
      --hairline:  #cfd5dc;
      --rule:      #8b95a0;
      --agent:     #3a5a7a;
      --agent-fill:#eaf0f5;
      --ci:        #1f7a4a;
      --ci-fill:   #e6f3ec;
      --human:     #b46a00;
      --human-fill:#fbeed1;
      --git:       #2b2f33;
      --git-fill:  #eef0f2;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:        #11141a;
        --ink:       #e6e9ee;
        --muted:     #8a93a0;
        --hairline:  #3a424d;
        --rule:      #5a6470;
        --agent:     #88aed3;
        --agent-fill:#1a2330;
        --ci:        #6fc093;
        --ci-fill:   #14241c;
        --human:     #e3a154;
        --human-fill:#2a2014;
        --git:       #c8cdd4;
        --git-fill:  #181c22;
      }
    }

    .frame      { fill: var(--bg); stroke: var(--hairline); }
    .lane       { fill: var(--bg); stroke: var(--hairline); stroke-dasharray: 2 3; }
    .lane-label { font: 700 10px ui-monospace, 'SF Mono', Menlo, Consolas, monospace; letter-spacing: 0.8px; fill: var(--muted); }

    .h-title    { font: 700 13px -apple-system, system-ui, sans-serif; letter-spacing: 2px; fill: var(--ink); }
    .h-sub      { font: 400 11px -apple-system, system-ui, sans-serif; fill: var(--muted); }

    .node       { fill: var(--agent-fill); stroke: var(--agent); stroke-width: 1.5; }
    .node.ci    { fill: var(--ci-fill);    stroke: var(--ci); }

    .step-num   { font: 700 10px ui-monospace, Consolas, monospace; fill: var(--muted); letter-spacing: 0.5px; }
    .node-title { font: 600 12px -apple-system, system-ui, sans-serif; fill: var(--ink); }
    .node-sub   { font: 400 11px -apple-system, system-ui, sans-serif; fill: var(--muted); }
    .mono-tag   { font: 500 11px ui-monospace, Consolas, monospace; fill: var(--ink); }
    .mono-dim   { font: 400 10px ui-monospace, Consolas, monospace; fill: var(--muted); }

    .arrow      { stroke: var(--rule); stroke-width: 1.5; fill: none; }
    .arrow.loop { stroke: var(--ci); stroke-width: 2; stroke-dasharray: 5 4; }

    .gate       { fill: none; stroke: var(--ci); stroke-width: 1.2; stroke-dasharray: 4 3; }
    .gate-label { font: 700 10px ui-monospace, Consolas, monospace; fill: var(--ci); letter-spacing: 0.5px; }
    .gate-fill  { fill: var(--ci-fill); opacity: 0.55; }

    .loop-label { font: 600 11px ui-monospace, Consolas, monospace; fill: var(--ci); }
    .tagline    { font: 600 11px -apple-system, system-ui, sans-serif; fill: var(--ink); }
  </style>

  <defs>
    <marker id="a-rule" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="9" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,4 L0,8 z" fill="var(--rule)"/>
    </marker>
    <marker id="a-loop" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="9" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,4 L0,8 z" fill="var(--ci)"/>
    </marker>
    <marker id="a-ci" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="9" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,4 L0,8 z" fill="var(--ci)"/>
    </marker>
  </defs>

  <rect class="frame" x="0.5" y="0.5" width="799" height="759" rx="6"/>

  <!-- HEADER (y 0–60) -->
  <text class="h-title" x="24" y="32">SELF-EXTENSION PIPELINE</text>
  <text class="h-sub"   x="24" y="50">Five agent steps, three CI gates, zero manual hops.</text>

  <!-- ===== AGENT LANE (y 64 .. 478) ===== -->
  <line x1="24" y1="64" x2="776" y2="64" class="lane"/>
  <text class="lane-label" x="30"  y="80">AGENT</text>

  <!-- STEP 1 — TRIGGER (y 92..148) -->
  <g transform="translate(180 92)">
    <rect class="node" x="0" y="0" width="440" height="56" rx="6"/>
    <text class="step-num" x="12" y="18">STEP&#8201;1</text>
    <text class="node-title" x="12" y="36">Trigger</text>
    <text class="node-sub"   x="12" y="50">test fails  ·  user correction  ·  deploy issue  ·  realisation</text>
  </g>
  <line x1="400" y1="148" x2="400" y2="166" class="arrow" marker-end="url(#a-rule)"/>

  <!-- STEP 2 (y 170..226) -->
  <g transform="translate(180 170)">
    <rect class="node" x="0" y="0" width="440" height="56" rx="6"/>
    <text class="step-num" x="12" y="18">STEP&#8201;2</text>
    <text class="node-title" x="12" y="36">Search before write</text>
    <text class="mono-tag"   x="12" y="50">grep ERR- error-log.md</text>
  </g>
  <line x1="400" y1="226" x2="400" y2="244" class="arrow" marker-end="url(#a-rule)"/>

  <!-- STEP 3 (y 248..304) -->
  <g transform="translate(180 248)">
    <rect class="node" x="0" y="0" width="440" height="56" rx="6"/>
    <text class="step-num" x="12" y="18">STEP&#8201;3</text>
    <text class="node-title" x="12" y="36">Analyse</text>
    <text class="node-sub"   x="12" y="50">category  ·  severity  ·  cause</text>
  </g>
  <line x1="400" y1="304" x2="400" y2="322" class="arrow" marker-end="url(#a-rule)"/>

  <!-- STEP 4 (y 326..382) -->
  <g transform="translate(180 326)">
    <rect class="node" x="0" y="0" width="440" height="56" rx="6"/>
    <text class="step-num" x="12" y="18">STEP&#8201;4</text>
    <text class="node-title" x="12" y="36">Formulate new_rule</text>
    <text class="mono-tag"   x="12" y="50">verb &#8712; {Always, Never, Before, …}</text>
  </g>
  <line x1="400" y1="382" x2="400" y2="400" class="arrow" marker-end="url(#a-rule)"/>

  <!-- STEP 5 (y 404..460) -->
  <g transform="translate(180 404)">
    <rect class="node" x="0" y="0" width="440" height="56" rx="6"/>
    <text class="step-num" x="12" y="18">STEP&#8201;5</text>
    <text class="node-title" x="12" y="36">Open PR</text>
    <text class="mono-tag"   x="12" y="50">learn/ERR-2026-014  ·  needs-rule-review</text>
  </g>

  <!-- ===== CI LANE (y 478 .. 736) ===== -->
  <line x1="24" y1="478" x2="776" y2="478" class="lane"/>
  <text class="lane-label" x="30"  y="494">CI / AUTOMATED CHECKS</text>

  <!-- transition Step 5 → Gate A: bridges agent→CI lane -->
  <line x1="400" y1="460" x2="400" y2="506" class="arrow" marker-end="url(#a-ci)" stroke="var(--ci)"/>

  <!-- CI GATE A — lint-rules (y 510..566) -->
  <g transform="translate(180 510)">
    <rect class="gate-fill" x="0" y="0" width="440" height="56" rx="6"/>
    <rect class="gate"      x="0" y="0" width="440" height="56" rx="6"/>
    <text class="gate-label" x="12" y="18">CI GATE  ·  lint-rules</text>
    <text class="mono-tag"   x="12" y="36">schemas/error-entry.json  ·  verb allow-list</text>
    <text class="mono-dim"   x="12" y="50">fails build on schema drift</text>
  </g>
  <line x1="400" y1="566" x2="400" y2="584" class="arrow" marker-end="url(#a-ci)" stroke="var(--ci)"/>

  <!-- CI GATE B — auto-approve (y 588..644) -->
  <g transform="translate(180 588)">
    <rect class="gate-fill" x="0" y="0" width="440" height="56" rx="6"/>
    <rect class="gate"      x="0" y="0" width="440" height="56" rx="6"/>
    <text class="gate-label" x="12" y="18">CI GATE  ·  auto-approve-rule-pr</text>
    <text class="mono-tag"   x="12" y="36">scope: skills/**</text>
    <text class="mono-dim"   x="12" y="50">requires Co-Authored-By trailer</text>
  </g>
  <line x1="400" y1="644" x2="400" y2="662" class="arrow" marker-end="url(#a-ci)" stroke="var(--ci)"/>

  <!-- CI GATE C — auto-merge (y 666..722) -->
  <g transform="translate(180 666)">
    <rect class="gate-fill" x="0" y="0" width="440" height="56" rx="6"/>
    <rect class="gate"      x="0" y="0" width="440" height="56" rx="6"/>
    <text class="gate-label" x="12" y="18">CI GATE  ·  auto-merge</text>
    <text class="mono-tag"   x="12" y="36">squash → refs/heads/main</text>
    <text class="mono-dim"   x="12" y="50">human review: see pr-flow.svg</text>
  </g>

  <!-- ============= FEEDBACK LOOP =============
       From right edge of Gate C (x=620, y=694 = mid-vertical), out around the right
       rail at x=748, up to Step 1 right edge (x=620, y=120 = mid-vertical).
       Right gutter span: gate right edge x=620, riser x=748 (28 px clear of frame at 776).
       Loop label rotated -90° centred between agent & CI lanes. -->
  <path d="M 620 694 C 720 694, 748 680, 748 620 C 748 200, 748 120, 620 120"
        class="arrow loop" marker-end="url(#a-loop)" fill="none"/>
  <text class="loop-label" x="762" y="408" transform="rotate(-90 762 408)" text-anchor="middle">
    next session inherits the fix
  </text>

  <!-- TAGLINE (y 748) -->
  <text class="tagline" x="400" y="748" text-anchor="middle">plain Markdown  ·  versioned in Git  ·  auto-merged when gates pass</text>
</svg>
