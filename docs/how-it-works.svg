<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 340" fill="none">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="340" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <!-- Node gradients -->
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#ee5a24"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd93d"/>
      <stop offset="100%" stop-color="#f0b429"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6bcb77"/>
      <stop offset="100%" stop-color="#38a169"/>
    </linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4d96ff"/>
      <stop offset="100%" stop-color="#3182ce"/>
    </linearGradient>
    <linearGradient id="g5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9b59b6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="g6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2ecc71"/>
      <stop offset="100%" stop-color="#27ae60"/>
    </linearGradient>
    <!-- Glow filters -->
    <filter id="glow1" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <!-- Arrow marker -->
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b949e"/>
    </marker>
    <marker id="arrow-dash" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#58a6ff"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="960" height="340" rx="16" fill="url(#bg)"/>
  <rect width="960" height="340" rx="16" fill="none" stroke="#30363d" stroke-width="1"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#58a6ff" letter-spacing="2">HOW IT WORKS</text>

  <!-- Connection arrows (behind nodes) -->
  <!-- 1→2 -->
  <line x1="175" y1="150" x2="215" y2="150" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- 2→3 -->
  <line x1="335" y1="150" x2="375" y2="150" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- 3→4 -->
  <line x1="495" y1="150" x2="535" y2="150" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- 4→5 -->
  <line x1="655" y1="150" x2="695" y2="150" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- 5→6 -->
  <line x1="815" y1="150" x2="855" y2="150" stroke="#8b949e" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Feedback loop (dashed curved path from node 6 back to node 1) -->
  <path d="M 910 180 Q 910 290, 480 290 Q 50 290, 50 180" stroke="#58a6ff" stroke-width="2" stroke-dasharray="8 4" fill="none" marker-end="url(#arrow-dash)"/>
  <text x="480" y="310" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="11" fill="#58a6ff" font-style="italic">next session — the cycle continues</text>

  <!-- Node 1: Mistake -->
  <g filter="url(#shadow)">
    <rect x="55" y="95" width="120" height="110" rx="12" fill="url(#g1)" opacity="0.15"/>
    <rect x="55" y="95" width="120" height="110" rx="12" fill="none" stroke="url(#g1)" stroke-width="2"/>
    <text x="115" y="132" text-anchor="middle" font-size="28">🤖</text>
    <text x="115" y="158" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="600" fill="#f0f6fc">Agent makes</text>
    <text x="115" y="175" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="600" fill="#f0f6fc">a mistake</text>
    <text x="115" y="195" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#8b949e">or learns something new</text>
  </g>

  <!-- Node 2: Analyze -->
  <g filter="url(#shadow)">
    <rect x="215" y="95" width="120" height="110" rx="12" fill="url(#g2)" opacity="0.15"/>
    <rect x="215" y="95" width="120" height="110" rx="12" fill="none" stroke="url(#g2)" stroke-width="2"/>
    <text x="275" y="132" text-anchor="middle" font-size="28">🔍</text>
    <text x="275" y="158" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="600" fill="#f0f6fc">Mistake is</text>
    <text x="275" y="175" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="600" fill="#f0f6fc">analyzed</text>
    <text x="275" y="195" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#8b949e">root cause identified</text>
  </g>

  <!-- Node 3: Formulate -->
  <g filter="url(#shadow)">
    <rect x="375" y="95" width="120" height="110" rx="12" fill="url(#g3)" opacity="0.15"/>
    <rect x="375" y="95" width="120" height="110" rx="12" fill="none" stroke="url(#g3)" stroke-width="2"/>
    <text x="435" y="132" text-anchor="middle" font-size="28">📝</text>
    <text x="435" y="158" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="600" fill="#f0f6fc">Rule is</text>
    <text x="435" y="175" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="600" fill="#f0f6fc">formulated</text>
    <text x="435" y="195" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#8b949e">actionable directive</text>
  </g>

  <!-- Node 4: Update -->
  <g filter="url(#shadow)">
    <rect x="535" y="95" width="120" height="110" rx="12" fill="url(#g4)" opacity="0.15"/>
    <rect x="535" y="95" width="120" height="110" rx="12" fill="none" stroke="url(#g4)" stroke-width="2"/>
    <text x="595" y="132" text-anchor="middle" font-size="28">📂</text>
    <text x="595" y="158" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="600" fill="#f0f6fc">Skill file</text>
    <text x="595" y="175" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="600" fill="#f0f6fc">is updated</text>
    <text x="595" y="195" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#8b949e">right sub-skill targeted</text>
  </g>

  <!-- Node 5: Commit -->
  <g filter="url(#shadow)">
    <rect x="695" y="95" width="120" height="110" rx="12" fill="url(#g5)" opacity="0.15"/>
    <rect x="695" y="95" width="120" height="110" rx="12" fill="none" stroke="url(#g5)" stroke-width="2"/>
    <text x="755" y="132" text-anchor="middle" font-size="28">🔒</text>
    <text x="755" y="158" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="600" fill="#f0f6fc">Git commit</text>
    <text x="755" y="175" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="600" fill="#f0f6fc">preserves it</text>
    <text x="755" y="195" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#8b949e">diff · blame · revert</text>
  </g>

  <!-- Node 6: Never again -->
  <g filter="url(#shadow)">
    <rect x="855" y="95" width="120" height="110" rx="12" fill="url(#g6)" opacity="0.15"/>
    <rect x="855" y="95" width="120" height="110" rx="12" fill="none" stroke="url(#g6)" stroke-width="2"/>
    <text x="915" y="132" text-anchor="middle" font-size="28">✅</text>
    <text x="915" y="158" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="600" fill="#f0f6fc">Never happens</text>
    <text x="915" y="175" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="12" font-weight="600" fill="#f0f6fc">again</text>
    <text x="915" y="195" text-anchor="middle" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#8b949e">experience compounds</text>
  </g>

  <!-- Step numbers (subtle) -->
  <text x="67" y="110" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#484f58" font-weight="700">1</text>
  <text x="227" y="110" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#484f58" font-weight="700">2</text>
  <text x="387" y="110" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#484f58" font-weight="700">3</text>
  <text x="547" y="110" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#484f58" font-weight="700">4</text>
  <text x="707" y="110" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#484f58" font-weight="700">5</text>
  <text x="867" y="110" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#484f58" font-weight="700">6</text>

  <!-- Watermark -->
  <text x="940" y="332" text-anchor="end" font-family="'Segoe UI', system-ui, sans-serif" font-size="9" fill="#30363d">skill-everythink</text>
</svg>
