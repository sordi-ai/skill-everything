<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc" font-family="-apple-system, system-ui, 'Segoe UI', Roboto, sans-serif">
  <title id="title">Capability comparison — skill-everything vs AGENTS.md, Cursor Rules, mem0/MemGPT</title>
  <desc id="desc">Capability matrix comparing skill-everything against AGENTS.md, Cursor Rules, and mem0/MemGPT across nine capabilities plus a setup-cost row. skill-everything is supported on every capability row; AGENTS.md, Cursor Rules, and mem0/MemGPT are partial or missing on most. Bottom strap: skill-everything 9 of 9, AGENTS.md 3 of 9, Cursor Rules 2 of 9, mem0 1 of 9.</desc>

  <style>
    :root {
      --bg:        #fbfbfa;
      --ink:       #1a1d21;
      --muted:     #5a6470;
      --hairline:  #cfd5dc;
      --rule:      #8b95a0;
      --agent:     #3a5a7a;
      --agent-fill:#eaf0f5;
      --ci:        #1f7a4a;
      --ci-fill:   #e6f3ec;
      --human:     #b46a00;
      --human-fill:#fbeed1;
      --git:       #2b2f33;
      --git-fill:  #eef0f2;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:        #11141a;
        --ink:       #e6e9ee;
        --muted:     #8a93a0;
        --hairline:  #3a424d;
        --rule:      #5a6470;
        --agent:     #88aed3;
        --agent-fill:#1a2330;
        --ci:        #6fc093;
        --ci-fill:   #14241c;
        --human:     #e3a154;
        --human-fill:#2a2014;
        --git:       #c8cdd4;
        --git-fill:  #181c22;
      }
    }

    .frame      { fill: var(--bg); stroke: var(--hairline); }
    .lane-label { font: 700 10px ui-monospace, 'SF Mono', Menlo, Consolas, monospace; letter-spacing: 0.8px; fill: var(--muted); }

    .hero       { font: 700 26px -apple-system, system-ui, sans-serif; letter-spacing: -0.4px; fill: var(--ink); }
    .hero-sub   { font: 400 13px -apple-system, system-ui, sans-serif; fill: var(--muted); }

    /* table cells */
    .col-hero      { fill: var(--agent-fill); stroke: var(--agent); stroke-width: 1.5; }
    .row-hairline  { stroke: var(--hairline); stroke-width: 0.6; }

    .col-header-hero      { font: 800 16px -apple-system, system-ui, sans-serif; letter-spacing: -0.3px; fill: var(--agent); }
    .col-header-hero-sub  { font: 600 10px ui-monospace, Consolas, monospace; letter-spacing: 0.8px; fill: var(--agent); }
    .col-header-other     { font: 700 11px ui-monospace, Consolas, monospace; letter-spacing: 0.5px; fill: var(--muted); }

    .row-label     { font: 600 12px -apple-system, system-ui, sans-serif; fill: var(--ink); }
    .row-meta      { font: 400 10px -apple-system, system-ui, sans-serif; fill: var(--muted); font-style: italic; }

    /* glyphs */
    .yes-hero-circle { fill: var(--ci-fill); stroke: var(--ci); stroke-width: 1.5; }
    .yes-hero        { font: 800 20px -apple-system, system-ui, sans-serif; fill: var(--ci); }
    .yes-other       { font: 600 16px -apple-system, system-ui, sans-serif; fill: var(--muted); }
    .partial         { font: 600 16px -apple-system, system-ui, sans-serif; fill: var(--human); }
    .no              { font: 500 16px -apple-system, system-ui, sans-serif; fill: var(--hairline); }
    .na              { font: 500 11px ui-monospace, Consolas, monospace; fill: var(--muted); letter-spacing: 0.4px; }

    .mono-tag      { font: 500 11px ui-monospace, Consolas, monospace; fill: var(--ink); }
    .mono-dim      { font: 500 10px ui-monospace, Consolas, monospace; fill: var(--muted); }
    .mono-hero     { font: 800 12px ui-monospace, Consolas, monospace; fill: var(--ci); letter-spacing: 0.3px; }
    .mono-cost     { font: 500 10px ui-monospace, Consolas, monospace; fill: var(--muted); }
    .mono-cost-hero{ font: 500 10px ui-monospace, Consolas, monospace; fill: var(--ci); }

    /* score strap */
    .score-bg     { fill: var(--ci-fill); stroke: var(--ci); stroke-width: 1.5; }
    .score-num    { font: 800 36px -apple-system, system-ui, sans-serif; letter-spacing: -1px; fill: var(--ci); }
    .score-text   { font: 700 14px -apple-system, system-ui, sans-serif; fill: var(--ink); }
    .score-meta   { font: 400 11px -apple-system, system-ui, sans-serif; fill: var(--muted); font-style: italic; }

    .vs-bg        { fill: var(--bg); stroke: var(--hairline); }
    .vs-label     { font: 700 9px ui-monospace, Consolas, monospace; letter-spacing: 0.6px; fill: var(--muted); }
    .vs-num       { font: 800 18px -apple-system, system-ui, sans-serif; letter-spacing: -0.3px; fill: var(--ink); }
    .vs-meta      { font: 400 9px -apple-system, system-ui, sans-serif; fill: var(--muted); font-style: italic; }

    /* hero column header band */
    .hero-bar     { fill: var(--agent); opacity: 0.10; }

    .legend-t   { font: 500 10px -apple-system, system-ui, sans-serif; fill: var(--ink); }
    .footer     { font: 400 10px ui-monospace, Consolas, monospace; fill: var(--muted); }
  </style>

  <rect class="frame" x="0.5" y="0.5" width="1199" height="719" rx="6"/>

  <!-- ============== HEADER ============== -->
  <text class="lane-label" x="24" y="28">CAPABILITY MATRIX  /  skill-everything  vs  AGENTS.md  ·  Cursor Rules  ·  mem0/MemGPT</text>
  <text class="hero"       x="24" y="64">The complete agent-memory stack.</text>
  <text class="hero-sub"   x="24" y="86">Plain Markdown. Git-versioned. Token-capped. Schema-validated. Self-extending. Audit-trailed.</text>

  <!-- legend top right
       Total width budget 320 px ending at x=1176.
       New layout: each pair (glyph + label) hugs tighter; total spans x=856..1176. -->
  <g transform="translate(856 24)">
    <text class="yes-hero"  x="0"   y="14" text-anchor="middle">✓</text>
    <text class="legend-t"  x="12"  y="15">supported</text>
    <text class="partial"   x="84"  y="14" text-anchor="middle">◐</text>
    <text class="legend-t"  x="96"  y="15">partial</text>
    <text class="no"        x="148" y="14" text-anchor="middle">✗</text>
    <text class="legend-t"  x="160" y="15">missing</text>
    <text class="na"        x="220" y="14" text-anchor="middle">n/a</text>
    <text class="legend-t"  x="240" y="15">not applicable</text>
  </g>

  <!-- ============== TABLE GEOMETRY ==============
       Total row width: x=24..1176 (1152 px)
       Columns:
         Capability label:  x=24..380   (356 px)
         skill-everything:  x=380..820  (440 px)  HERO
         AGENTS.md:         x=820..930  (110 px)
         Cursor Rules:      x=930..1050 (120 px)
         mem0 / MemGPT:     x=1050..1176(126 px)
       Header row y=110..160
       Rows: y=160..600 (10 rows × 44 px)
       Score strap y=620..695
  -->

  <!-- HERO column background spanning header + rows -->
  <rect class="col-hero" x="380" y="110" width="440" height="490" rx="6"/>

  <!-- header band (brand accent) inside hero column -->
  <rect class="hero-bar" x="380" y="110" width="440" height="50" rx="6"/>

  <!-- ============== HEADER ROW ============== -->
  <text class="lane-label"           x="36"  y="142">CAPABILITY</text>
  <text class="col-header-hero"      x="600" y="135" text-anchor="middle">skill-everything</text>
  <text class="col-header-hero-sub"  x="600" y="151" text-anchor="middle">OPEN-SOURCE  ·  ZERO DEPS  ·  CI-GATED</text>
  <text class="col-header-other"     x="875"  y="142" text-anchor="middle">AGENTS.md</text>
  <text class="col-header-other"     x="990"  y="142" text-anchor="middle">Cursor Rules</text>
  <text class="col-header-other"     x="1113" y="142" text-anchor="middle">mem0 / MemGPT</text>

  <!-- Header bottom rule -->
  <line x1="24" y1="160" x2="1176" y2="160" stroke="var(--rule)" stroke-width="1"/>

  <!-- ============== ROWS ==============
       Row height: 44 px. Glyph centre at top+22, baseline +28. -->

  <!-- Row 1 — Plain Markdown, no DB  (y=160..204) -->
  <line x1="24" y1="204" x2="1176" y2="204" class="row-hairline"/>
  <text class="row-label" x="36" y="180">Plain Markdown, no database</text>
  <text class="row-meta"  x="36" y="194">no embeddings, no SaaS, no daemon</text>
  <circle class="yes-hero-circle" cx="600" cy="182" r="14"/>
  <text class="yes-hero"  x="600" y="190" text-anchor="middle">✓</text>
  <text class="yes-other" x="875"  y="187" text-anchor="middle">✓</text>
  <text class="yes-other" x="990"  y="187" text-anchor="middle">✓</text>
  <text class="no"        x="1113" y="187" text-anchor="middle">✗</text>

  <!-- Row 2 — Git-versioned out of the box  (y=204..248) -->
  <line x1="24" y1="248" x2="1176" y2="248" class="row-hairline"/>
  <text class="row-label" x="36" y="224">Git-versioned out of the box</text>
  <text class="row-meta"  x="36" y="238">every change is a commit, every revert is `git revert`</text>
  <circle class="yes-hero-circle" cx="600" cy="226" r="14"/>
  <text class="yes-hero"  x="600" y="234" text-anchor="middle">✓</text>
  <text class="yes-other" x="875"  y="231" text-anchor="middle">✓</text>
  <text class="yes-other" x="990"  y="231" text-anchor="middle">✓</text>
  <text class="no"        x="1113" y="231" text-anchor="middle">✗</text>

  <!-- Row 3 — Cross-tool portable  (y=248..292) -->
  <line x1="24" y1="292" x2="1176" y2="292" class="row-hairline"/>
  <text class="row-label" x="36" y="268">Cross-tool portable</text>
  <text class="row-meta"  x="36" y="282">one index, four loaders: Claude · Gemini · OpenCode · Cursor</text>
  <circle class="yes-hero-circle" cx="600" cy="270" r="14"/>
  <text class="yes-hero"  x="600" y="278" text-anchor="middle">✓</text>
  <text class="partial"   x="875"  y="275" text-anchor="middle">◐</text>
  <text class="mono-dim"  x="990"  y="275" text-anchor="middle">Cursor-only</text>
  <text class="partial"   x="1113" y="275" text-anchor="middle">◐</text>

  <!-- Row 4 — Per-skill 3k-token cap, CI-enforced  (y=292..336) -->
  <line x1="24" y1="336" x2="1176" y2="336" class="row-hairline"/>
  <text class="row-label" x="36" y="312">Per-skill 3k-token cap, CI-enforced</text>
  <text class="row-meta"  x="36" y="326">build fails if any skill blows the budget</text>
  <circle class="yes-hero-circle" cx="600" cy="314" r="14"/>
  <text class="yes-hero"  x="600" y="322" text-anchor="middle">✓</text>
  <text class="no"        x="875"  y="319" text-anchor="middle">✗</text>
  <text class="no"        x="990"  y="319" text-anchor="middle">✗</text>
  <text class="na"        x="1113" y="320" text-anchor="middle">n/a</text>

  <!-- Row 5 — Schema-validated rule entries  (y=336..380) -->
  <line x1="24" y1="380" x2="1176" y2="380" class="row-hairline"/>
  <text class="row-label" x="36" y="356">Schema-validated rule entries</text>
  <text class="row-meta"  x="36" y="370">JSON Schema gate on every error-log entry</text>
  <circle class="yes-hero-circle" cx="600" cy="358" r="14"/>
  <text class="yes-hero"  x="600" y="366" text-anchor="middle">✓</text>
  <text class="no"        x="875"  y="363" text-anchor="middle">✗</text>
  <text class="no"        x="990"  y="363" text-anchor="middle">✗</text>
  <text class="no"        x="1113" y="363" text-anchor="middle">✗</text>

  <!-- Row 6 — Versioned skill-manifest frontmatter  (y=380..424) -->
  <line x1="24" y1="424" x2="1176" y2="424" class="row-hairline"/>
  <text class="row-label" x="36" y="400">Versioned skill-manifest frontmatter</text>
  <text class="row-meta"  x="36" y="414">`schemas/skill-manifest.json` on every sub-skill</text>
  <circle class="yes-hero-circle" cx="600" cy="402" r="14"/>
  <text class="yes-hero"  x="600" y="410" text-anchor="middle">✓</text>
  <text class="no"        x="875"  y="407" text-anchor="middle">✗</text>
  <text class="no"        x="990"  y="407" text-anchor="middle">✗</text>
  <text class="no"        x="1113" y="407" text-anchor="middle">✗</text>

  <!-- Row 7 — Self-extending via PR  (y=424..468) -->
  <line x1="24" y1="468" x2="1176" y2="468" class="row-hairline"/>
  <text class="row-label" x="36" y="444">Self-extending via PR</text>
  <text class="row-meta"  x="36" y="458">agent captures its own mistakes as new rules, opens a PR</text>
  <circle class="yes-hero-circle" cx="600" cy="446" r="14"/>
  <text class="yes-hero"  x="600" y="454" text-anchor="middle">✓</text>
  <text class="no"        x="875"  y="451" text-anchor="middle">✗</text>
  <text class="no"        x="990"  y="451" text-anchor="middle">✗</text>
  <text class="no"        x="1113" y="451" text-anchor="middle">✗</text>

  <!-- Row 8 — Skill-router auto-loads on trigger  (y=468..512) -->
  <line x1="24" y1="512" x2="1176" y2="512" class="row-hairline"/>
  <text class="row-label" x="36" y="488">Skill-router auto-loads on trigger</text>
  <text class="row-meta"  x="36" y="502">~150-token router selects 1-2 sub-skills per message</text>
  <circle class="yes-hero-circle" cx="600" cy="490" r="14"/>
  <text class="yes-hero"  x="600" y="498" text-anchor="middle">✓</text>
  <text class="no"        x="875"  y="495" text-anchor="middle">✗</text>
  <text class="no"        x="990"  y="495" text-anchor="middle">✗</text>
  <text class="partial"   x="1113" y="495" text-anchor="middle">◐</text>

  <!-- Row 9 — Audit trail in git history  (y=512..556) -->
  <line x1="24" y1="556" x2="1176" y2="556" class="row-hairline"/>
  <text class="row-label" x="36" y="532">Audit trail in git history</text>
  <text class="row-meta"  x="36" y="546">who changed which rule, when, why — `git blame` works</text>
  <circle class="yes-hero-circle" cx="600" cy="534" r="14"/>
  <text class="yes-hero"  x="600" y="542" text-anchor="middle">✓</text>
  <text class="yes-other" x="875"  y="539" text-anchor="middle">✓</text>
  <text class="yes-other" x="990"  y="539" text-anchor="middle">✓</text>
  <text class="no"        x="1113" y="539" text-anchor="middle">✗</text>

  <!-- Row 10 — Setup cost  (y=556..600) -->
  <text class="row-label" x="36" y="576">Setup cost</text>
  <text class="row-meta"  x="36" y="590">how much do you have to install before the first message</text>
  <text class="mono-hero"      x="600"  y="580" text-anchor="middle">git clone</text>
  <text class="mono-cost-hero" x="600"  y="594" text-anchor="middle">15 seconds, zero deps</text>
  <text class="mono-tag"  x="875"  y="580" text-anchor="middle">none</text>
  <text class="mono-cost" x="875"  y="594" text-anchor="middle">no review layer</text>
  <text class="mono-tag"  x="990"  y="580" text-anchor="middle">none</text>
  <text class="mono-cost" x="990"  y="594" text-anchor="middle">Cursor IDE only</text>
  <text class="mono-tag"  x="1113" y="580" text-anchor="middle">API key + SaaS</text>
  <text class="mono-cost" x="1113" y="594" text-anchor="middle">+ DB + embeddings</text>

  <!-- vertical column separators on the OTHER columns -->
  <line x1="820"  y1="110" x2="820"  y2="600" class="row-hairline"/>
  <line x1="930"  y1="110" x2="930"  y2="600" class="row-hairline"/>
  <line x1="1050" y1="110" x2="1050" y2="600" class="row-hairline"/>

  <!-- table outer right + left + bottom -->
  <line x1="1176" y1="110" x2="1176" y2="600" class="row-hairline"/>
  <line x1="24"   y1="110" x2="24"   y2="600" class="row-hairline"/>
  <line x1="24"   y1="600" x2="1176" y2="600" stroke="var(--rule)" stroke-width="1"/>

  <!-- ============== SCORE STRAP ============== -->
  <g transform="translate(24 620)">
    <rect class="score-bg" x="0" y="0" width="1152" height="70" rx="6"/>

    <!-- big 9/9 -->
    <text class="score-num"  x="40"  y="48">9 / 9</text>
    <text class="score-text" x="160" y="32">skill-everything carries every category in this matrix.</text>
    <text class="score-meta" x="160" y="52">cross-tool portable · token-capped · schema-validated · self-extending · audit-trailed · one git clone away.</text>

    <!-- right-side numeric callouts: 3 chips -->
    <g transform="translate(730 10)">
      <rect class="vs-bg" x="0" y="0" width="130" height="50" rx="4"/>
      <text class="vs-label" x="65" y="14" text-anchor="middle">vs AGENTS.md</text>
      <text class="vs-num"   x="65" y="34" text-anchor="middle">3 / 9</text>
      <text class="vs-meta"  x="65" y="46" text-anchor="middle">no review layer</text>
    </g>
    <g transform="translate(870 10)">
      <rect class="vs-bg" x="0" y="0" width="140" height="50" rx="4"/>
      <text class="vs-label" x="70" y="14" text-anchor="middle">vs CURSOR RULES</text>
      <text class="vs-num"   x="70" y="34" text-anchor="middle">2 / 9</text>
      <text class="vs-meta"  x="70" y="46" text-anchor="middle">Cursor IDE only</text>
    </g>
    <g transform="translate(1020 10)">
      <rect class="vs-bg" x="0" y="0" width="122" height="50" rx="4"/>
      <text class="vs-label" x="61" y="14" text-anchor="middle">vs MEM0</text>
      <text class="vs-num"   x="61" y="34" text-anchor="middle">1 / 9</text>
      <text class="vs-meta"  x="61" y="46" text-anchor="middle">SaaS-bound</text>
    </g>
  </g>

  <!-- ============== FOOTER ============== -->
  <text class="footer" x="24"   y="708">edit references/_index.yml  ·  CI-validated on every push  ·  one source, four loaders</text>
  <text class="footer" x="1176" y="708" text-anchor="end">skill-everything  /  docs/comparison.svg</text>
</svg>
