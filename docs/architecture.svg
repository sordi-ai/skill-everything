<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" role="img" aria-labelledby="title desc" font-family="-apple-system, system-ui, 'Segoe UI', Roboto, sans-serif">
  <title id="title">skill-everything architecture — single source of truth, four loaders</title>
  <desc id="desc">references/_index.yml is rendered by tools/render_loaders.py into four tool-specific loader files: SKILL.md (OpenCode), CLAUDE.md (Claude Code), GEMINI.md (Gemini CLI) and a Cursor stub. All four loaders point at the same sub-skill directory. A loaders-and-table-no-drift CI gate fails the build if any loader file diverges from the index.</desc>

  <style>
    :root {
      --bg:        #fbfbfa;
      --ink:       #1a1d21;
      --muted:     #5a6470;
      --hairline:  #cfd5dc;
      --rule:      #8b95a0;
      --agent:     #3a5a7a;
      --agent-fill:#eaf0f5;
      --ci:        #1f7a4a;
      --ci-fill:   #e6f3ec;
      --human:     #b46a00;
      --human-fill:#fbeed1;
      --git:       #2b2f33;
      --git-fill:  #eef0f2;
      --loop:      #7c3aed;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:        #11141a;
        --ink:       #e6e9ee;
        --muted:     #8a93a0;
        --hairline:  #3a424d;
        --rule:      #5a6470;
        --agent:     #88aed3;
        --agent-fill:#1a2330;
        --ci:        #6fc093;
        --ci-fill:   #14241c;
        --human:     #e3a154;
        --human-fill:#2a2014;
        --git:       #c8cdd4;
        --git-fill:  #181c22;
        --loop:      #b794ff;
      }
    }

    .frame      { fill: var(--bg); stroke: var(--hairline); }
    .lane       { fill: var(--bg); stroke: var(--hairline); stroke-dasharray: 2 3; }
    .lane-label { font: 700 10px ui-monospace, 'SF Mono', Menlo, Consolas, monospace; letter-spacing: 0.8px; fill: var(--muted); }

    .h-title    { font: 700 13px -apple-system, system-ui, sans-serif; letter-spacing: 2px; fill: var(--ink); }
    .h-sub      { font: 400 11px -apple-system, system-ui, sans-serif; fill: var(--muted); }

    .node       { fill: var(--agent-fill); stroke: var(--agent); stroke-width: 1.5; }
    .node.ci    { fill: var(--ci-fill);    stroke: var(--ci); }
    .node.human { fill: var(--human-fill); stroke: var(--human); }
    .node.git   { fill: var(--git-fill);   stroke: var(--git); }

    .step-num   { font: 700 10px ui-monospace, Consolas, monospace; fill: var(--muted); letter-spacing: 0.5px; }
    .node-title { font: 600 12px -apple-system, system-ui, sans-serif; fill: var(--ink); }
    .node-sub   { font: 400 11px -apple-system, system-ui, sans-serif; fill: var(--muted); }
    .mono       { font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace; }
    .mono-tag   { font: 500 11px ui-monospace, Consolas, monospace; fill: var(--ink); }
    .mono-dim   { font: 400 10px ui-monospace, Consolas, monospace; fill: var(--muted); }

    .arrow      { stroke: var(--rule); stroke-width: 1.5; fill: none; }
    .arrow.same { stroke: var(--loop); stroke-width: 1.5; stroke-dasharray: 5 4; fill: none; }

    .gate       { fill: none; stroke: var(--ci); stroke-width: 1.2; stroke-dasharray: 4 3; }
    .gate-label { font: 700 10px ui-monospace, Consolas, monospace; fill: var(--ci); letter-spacing: 0.5px; }
    .gate-fill  { fill: var(--ci-fill); opacity: 0.55; }

    .chip       { fill: var(--bg); stroke: var(--hairline); }
    .chip-text  { font: 500 10px ui-monospace, Consolas, monospace; fill: var(--ink); }

    .loop-label { font: 600 11px ui-monospace, Consolas, monospace; fill: var(--loop); }
    .legend-t   { font: 500 10px -apple-system, system-ui, sans-serif; fill: var(--ink); }
    .tagline    { font: 600 11px -apple-system, system-ui, sans-serif; fill: var(--ink); }
    .annot      { font: 400 10px -apple-system, system-ui, sans-serif; fill: var(--muted); font-style: italic; }
  </style>

  <defs>
    <marker id="a-rule" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="9" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,4 L0,8 z" fill="var(--rule)"/>
    </marker>
    <marker id="a-ci" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="9" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,4 L0,8 z" fill="var(--ci)"/>
    </marker>
    <marker id="a-same" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="9" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,4 L0,8 z" fill="var(--loop)"/>
    </marker>
  </defs>

  <!-- ============== FRAME ============== -->
  <rect class="frame" x="0.5" y="0.5" width="1199" height="499" rx="6"/>

  <!-- ============== HEADER ============== -->
  <text class="h-title" x="24" y="30">ARCHITECTURE  /  ONE INDEX, FOUR LOADERS</text>
  <text class="h-sub"   x="24" y="46">references/_index.yml is the source. tools/render_loaders.py writes the four loader files. CI fails on drift.</text>

  <!-- legend -->
  <g transform="translate(740 22)">
    <rect class="node git" x="0" y="0" width="14" height="10" rx="2"/>
    <text class="legend-t" x="20" y="9">source / generator</text>
    <rect class="node"     x="140" y="0" width="14" height="10" rx="2"/>
    <text class="legend-t" x="160" y="9">loader output</text>
    <rect class="node ci"  x="260" y="0" width="14" height="10" rx="2"/>
    <text class="legend-t" x="280" y="9">CI gate</text>
    <line x1="340" y1="5" x2="362" y2="5" class="arrow same" marker-end="url(#a-same)"/>
    <text class="legend-t" x="368" y="9">same sub-skill</text>
  </g>

  <!-- ============== SWIMLANES ============== -->
  <line x1="24"   y1="70"  x2="1176" y2="70"  class="lane"/>
  <line x1="24"   y1="180" x2="1176" y2="180" class="lane"/>
  <line x1="24"   y1="300" x2="1176" y2="300" class="lane"/>
  <line x1="24"   y1="400" x2="1176" y2="400" class="lane"/>

  <text class="lane-label" x="30"  y="85">SOURCE  ·  references/_index.yml</text>
  <text class="lane-label" x="30"  y="195">TOOLING  /  GENERATOR</text>
  <text class="lane-label" x="30"  y="315">LOADER OUTPUT  ·  per-tool entry-points</text>
  <text class="lane-label" x="30"  y="415">SUB-SKILL DIRECTORY  ·  references/**/*.md</text>

  <!-- ============== SOURCE: _index.yml hub ============== -->
  <!-- Box height bumped 68 → 80 to fit the loader-keys list across two
       lines instead of overflowing the right edge. -->
  <g transform="translate(490 95)">
    <rect class="node git" x="0" y="0" width="220" height="80" rx="6"/>
    <text class="step-num" x="10" y="14">SOURCE</text>
    <text class="node-title" x="10" y="32">references/_index.yml</text>
    <text class="mono-tag"   x="10" y="48">9 skills · 4 loader-keys each</text>
    <text class="mono-dim"   x="10" y="62">claude · gemini</text>
    <text class="mono-dim"   x="10" y="76">skill_resource · cursor</text>
  </g>

  <!-- annotation chip: skills count -->
  <g transform="translate(740 110)">
    <rect class="chip" x="0" y="0" width="180" height="22" rx="3"/>
    <text class="chip-text" x="8" y="14">9 skills, 4 loader keys each</text>
    <text class="annot"     x="0" y="38">id · title · path · triggers</text>
  </g>

  <!-- annotation chip on left: meta -->
  <g transform="translate(280 110)">
    <rect class="chip" x="0" y="0" width="180" height="22" rx="3"/>
    <text class="chip-text" x="8" y="14">meta.version: 1.2.0</text>
    <text class="annot"     x="0" y="38">single source of truth</text>
  </g>

  <!-- arrow: source → generator (start raised from y=163 to y=175 to match
       the new SOURCE box bottom) -->
  <line x1="600" y1="175" x2="600" y2="220" class="arrow" marker-end="url(#a-rule)"/>
  <text class="annot" x="608" y="200">read</text>

  <!-- ============== TOOLING: render_loaders.py ============== -->
  <g transform="translate(490 220)">
    <rect class="node" x="0" y="0" width="220" height="60" rx="6"/>
    <text class="step-num" x="10" y="14">GENERATOR</text>
    <text class="node-title" x="10" y="32">tools/render_loaders.py</text>
    <text class="mono-tag"   x="10" y="48">Jinja2 · _templates/*.j2</text>
  </g>

  <!-- annotation: idempotent -->
  <g transform="translate(740 230)">
    <text class="annot" x="0" y="14">deterministic · idempotent</text>
    <text class="annot" x="0" y="30">re-run produces zero diff</text>
  </g>

  <!-- annotation: command -->
  <g transform="translate(280 230)">
    <rect class="chip" x="0" y="0" width="180" height="22" rx="3"/>
    <text class="chip-text" x="8" y="14">python tools/render_loaders.py</text>
  </g>

  <!-- arrows: generator → 4 loader outputs -->
  <line x1="540" y1="280" x2="180" y2="320" class="arrow" marker-end="url(#a-rule)"/>
  <line x1="570" y1="280" x2="430" y2="320" class="arrow" marker-end="url(#a-rule)"/>
  <line x1="630" y1="280" x2="770" y2="320" class="arrow" marker-end="url(#a-rule)"/>
  <line x1="660" y1="280" x2="1020" y2="320" class="arrow" marker-end="url(#a-rule)"/>

  <!-- ============== LOADER OUTPUTS (4 files) ============== -->
  <!-- 1. SKILL.md (OpenCode) -->
  <g transform="translate(80 322)">
    <rect class="node" x="0" y="0" width="200" height="68" rx="6"/>
    <text class="step-num" x="10" y="14">OPENCODE</text>
    <text class="node-title" x="10" y="32">SKILL.md</text>
    <text class="mono-tag"   x="10" y="48">skill_resource(skill_name=…)</text>
    <text class="mono-dim"   x="10" y="62">9 calls  ·  one per sub-skill</text>
  </g>

  <!-- 2. CLAUDE.md (Claude Code) -->
  <g transform="translate(330 322)">
    <rect class="node" x="0" y="0" width="200" height="68" rx="6"/>
    <text class="step-num" x="10" y="14">CLAUDE CODE</text>
    <text class="node-title" x="10" y="32">CLAUDE.md</text>
    <text class="mono-tag"   x="10" y="48">@references/development/…</text>
    <text class="mono-dim"   x="10" y="62">imports + sub-skill table</text>
  </g>

  <!-- 3. GEMINI.md (Gemini CLI) -->
  <g transform="translate(670 322)">
    <rect class="node" x="0" y="0" width="200" height="68" rx="6"/>
    <text class="step-num" x="10" y="14">GEMINI CLI</text>
    <text class="node-title" x="10" y="32">GEMINI.md</text>
    <text class="mono-tag"   x="10" y="48">@references/…  ·  /memory show</text>
    <text class="mono-dim"   x="10" y="62">imports + reload command</text>
  </g>

  <!-- 4. .cursorrules (stub) -->
  <g transform="translate(920 322)">
    <rect class="node" x="0" y="0" width="200" height="68" rx="6"/>
    <text class="step-num" x="10" y="14">CURSOR  ·  optional</text>
    <text class="node-title" x="10" y="32">.cursorrules</text>
    <text class="mono-tag"   x="10" y="48">stub  ·  manual paste</text>
    <text class="mono-dim"   x="10" y="62">no native @-imports yet</text>
  </g>

  <!-- ============== SUB-SKILL DIRECTORY (shared) ============== -->
  <g transform="translate(80 425)">
    <rect class="chip" x="0" y="0" width="1040" height="40" rx="3"/>
    <text class="mono-tag" x="12" y="16">references/development/{code-quality,python,typescript,react}.md</text>
    <text class="mono-tag" x="12" y="32">references/{git/conventions,process/review-deployment,domain/template,errors/error-log,errors/self-extension-workflow}.md</text>
  </g>

  <!-- "same sub-skill" loop arrows from each loader to the directory -->
  <line x1="180" y1="390" x2="180" y2="424" class="arrow same" marker-end="url(#a-same)"/>
  <line x1="430" y1="390" x2="430" y2="424" class="arrow same" marker-end="url(#a-same)"/>
  <line x1="770" y1="390" x2="770" y2="424" class="arrow same" marker-end="url(#a-same)"/>
  <line x1="1020" y1="390" x2="1020" y2="424" class="arrow same" marker-end="url(#a-same)"/>

  <!-- "same" label centered above the directory -->
  <text class="loop-label" x="600" y="412" text-anchor="middle">all four loaders point at the same files</text>

  <!-- ============== CI GATE: drift detection ============== -->
  <!-- Box widened 200 → 245 and shifted left (x=940 → 910) so the
       gate-label fits on one line. Height 60 → 76 to accommodate the
       file-list in two lines instead of overflowing the right edge. -->
  <g transform="translate(910 220)">
    <rect class="gate-fill" x="0" y="0" width="245" height="76" rx="6"/>
    <rect class="gate"      x="0" y="0" width="245" height="76" rx="6"/>
    <text class="gate-label" x="10" y="15">CI GATE  ·  loaders-and-table-no-drift</text>
    <text class="mono-tag"   x="10" y="32">git diff --exit-code</text>
    <text class="mono-dim"   x="10" y="48">SKILL.md   CLAUDE.md</text>
    <text class="mono-dim"   x="10" y="62">GEMINI.md   .cursorrules</text>
  </g>

  <!-- arrow: generator → CI gate (end shifted from x=940 to x=910 to
       match the new CI-gate left edge) -->
  <path d="M 710 250 L 910 250" class="arrow" marker-end="url(#a-ci)" stroke="var(--ci)"/>

  <!-- ============== TAGLINE ============== -->
  <text class="tagline" x="1176" y="488" text-anchor="end">edit the index, regenerate, commit  ·  drift fails CI</text>
  <text class="mono-dim" x="24"   y="488">skill-everything  /  docs/architecture.svg</text>
</svg>
