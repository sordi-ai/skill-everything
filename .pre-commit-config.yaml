repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.7
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.0
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: validate-rules
        name: validate-rules (schema + lint of error-log.md)
        entry: python tools/validate_rules.py
        language: system
        files: ^skills/error-log/.*\.md$
        pass_filenames: false

      - id: render-loaders
        name: render-loaders (regenerate SKILL.md / CLAUDE.md / GEMINI.md / AGENTS.md / .cursor/rules/*)
        entry: python tools/render_loaders.py
        language: system
        pass_filenames: false
        # Per-skill .mdc outputs depend on each skills/<name>/SKILL.md body, so
        # changing any sub-skill source must trigger a re-render too.
        files: ^(skills/_index\.yml|skills/[^/]+/SKILL\.md|tools/templates/.*\.j2)$

      - id: render-readme-table
        name: render-readme-table (token table from skill manifests)
        entry: python tools/render_readme_table.py
        language: system
        pass_filenames: false
        files: ^(skills/.*\.md|README\.md|tools/render_readme_table\.py)$

      - id: check-token-budgets
        name: check-token-budgets (per-skill tiktoken count vs tokens_target)
        entry: python tools/check_token_budgets.py
        language: system
        pass_filenames: false
        files: ^skills/[^/]+/SKILL\.md$
