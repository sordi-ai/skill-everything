name: lint-rules

on:
  pull_request:
    paths:
      - "skills/error-log/**"
      - "skills/**/*.md"
      - "schemas/**"
      - "tools/validate_rules.py"

jobs:
  lint:
    name: validate rules + skill manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install pyyaml jsonschema
      - run: python tools/validate_rules.py
