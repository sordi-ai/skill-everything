# Single source of truth for sub-skill index.
# tools/render_loaders.py reads this and regenerates SKILL.md, CLAUDE.md, GEMINI.md, .cursorrules.
# CI fails if the regenerated files differ from what's in git (drift detection).

meta:
  name: skill-everything
  version: 0.75.0
  description: Git-versioned agent memory — agents that never make the same mistake twice.

skills:
  - id: code-quality
    title: Code Quality
    path: skills/code-quality/SKILL.md
    triggers:
      - writing code
      - refactoring
      - review
    loaders:
      claude:  '@skills/code-quality/SKILL.md'
      gemini:  '@skills/code-quality/SKILL.md'
      cursor:  '@file:./skills/code-quality/SKILL.md'
      skill_resource: 'skill_resource(skill_name="code-quality")'

  - id: python
    title: Python
    path: skills/python/SKILL.md
